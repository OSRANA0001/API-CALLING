<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather & AQI App</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container { max-width: 450px; margin: auto; }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 { font-size: 2em; font-weight: 600; }
        .credits { font-size: 0.85em; }

        .search-card {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .search-box { position: relative; }

        .search-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            border-radius: 50px;
            border: 2px solid #e0e0e0;
            font-size: 16px;
        }

        .search-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            cursor: pointer;
        }

        .search-btn::before { content: "🔍"; font-size: 20px; }

        .info-text { text-align: center; font-size: 0.8em; margin-top: 10px; }

        .error-message {
            background: #ffe6e6;
            color: #d93025;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            display: none;
        }

        .loading { text-align: center; color: white; display: none; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        .weather-card, .aqi-card {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 30px;
            margin-top: 20px;
            display: none;
        }

        .city-name { font-size: 1.8em; font-weight: 600; }
        .weather-icon { font-size: 100px; }
        .temperature { font-size: 4em; font-weight: 700; }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 15px;
        }

        .detail-box {
            background: linear-gradient(135deg,#667eea,#764ba2);
            padding: 18px;
            border-radius: 18px;
            color: white;
            text-align: center;
        }

        .aqi-value {
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 1.4em;
            display: inline-block;
        }

        .aqi-level-1 { background: #2ecc71; }
        .aqi-level-2 { background: #f1c40f; }
        .aqi-level-3 { background: #e67e22; }
        .aqi-level-4 { background: #e74c3c; }
        .aqi-level-5 { background: #8e44ad; }

        .pollutants-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 10px;
        }

        .pollutant-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInDown { from {opacity:0; transform:translateY(-20px);} to {opacity:1;} }
    </style>
</head>

<body>
<div class="app-container">

    <div class="header">
        <h1>🌤️ Weather Forcasting App</h1>
        <div class="credits">By OMDEVSINH S JHALA</div>
    </div>

    <div class="search-card">
        <div class="search-box">
            <input id="cityInput" class="search-input" placeholder="Enter city name" aria-label="City name">
            <button id="searchBtn" class="search-btn" aria-label="Search city"></button>
        </div>
        <div class="info-text">Try: London, New York, Mumbai</div>
        <div id="errorMsg" class="error-message" role="alert"></div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Fetching weather data...</p>
    </div>

    <div class="weather-card" id="weatherCard">
        <div class="city-name" id="cityName"></div>
        <div id="dateTime"></div>
        <div class="weather-icon" id="weatherIcon"></div>
        <div class="temperature" id="temperature"></div>
        <div id="weatherDesc"></div>

        <div class="weather-details">
            <div class="detail-box">💧 <div id="humidity"></div></div>
            <div class="detail-box">💨 <div id="windSpeed"></div></div>
            <div class="detail-box">🌡️ <div id="feelsLike"></div></div>
            <div class="detail-box">🔽 <div id="pressure"></div></div>
        </div>
    </div>

    <div class="aqi-card" id="aqiCard">
        <h3>🌍 Air Quality Index</h3>
        <div id="aqiValue" class="aqi-value"></div>
        <p id="aqiDesc"></p>
        <div id="pollutantsGrid" class="pollutants-grid"></div>
    </div>

</div>

<script>
const API_KEY = '15b5293cc9effe698c1dd2c1733d18de';
const API_BASE = 'https://api.openweathermap.org/data/2.5';

const weatherIcons = {
    '01d':'☀️','01n':'🌙',
    '02d':'⛅','02n':'🌙☁️',
    '03d':'☁️','03n':'☁️',
    '04d':'☁️','04n':'☁️',
    '09d':'🌧️','09n':'🌧️',
    '10d':'🌦️','10n':'🌧️',
    '11d':'⛈️','11n':'⛈️',
    '13d':'❄️','13n':'❄️',
    '50d':'🌫️','50n':'🌫️'
};

const aqiInfo = {
    1:{label:'Good',class:'aqi-level-1',desc:'Air quality is excellent.'},
    2:{label:'Fair',class:'aqi-level-2',desc:'Air quality is acceptable.'},
    3:{label:'Moderate',class:'aqi-level-3',desc:'Sensitive groups may feel effects.'},
    4:{label:'Poor',class:'aqi-level-4',desc:'Health effects possible.'},
    5:{label:'Very Poor',class:'aqi-level-5',desc:'Avoid outdoor activities.'}
};

// Explicit DOM references
const cityInput = document.getElementById('cityInput');
const searchBtn = document.getElementById('searchBtn');
const errorMsg = document.getElementById('errorMsg');
const loading = document.getElementById('loading');
const weatherCard = document.getElementById('weatherCard');
const aqiCard = document.getElementById('aqiCard');
const cityName = document.getElementById('cityName');
const dateTime = document.getElementById('dateTime');
const weatherIcon = document.getElementById('weatherIcon');
const temperature = document.getElementById('temperature');
const weatherDesc = document.getElementById('weatherDesc');
const humidity = document.getElementById('humidity');
const windSpeed = document.getElementById('windSpeed');
const feelsLike = document.getElementById('feelsLike');
const pressure = document.getElementById('pressure');
const aqiValue = document.getElementById('aqiValue');
const aqiDesc = document.getElementById('aqiDesc');
const pollutantsGrid = document.getElementById('pollutantsGrid');

searchBtn.addEventListener('click', handleSearch);
cityInput.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') handleSearch();
});

function clearError() {
    errorMsg.textContent = '';
    errorMsg.style.display = 'none';
}

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
}

function showLoading() {
    loading.style.display = 'block';
    weatherCard.style.display = 'none';
    aqiCard.style.display = 'none';
}

function hideLoading() {
    loading.style.display = 'none';
}

async function handleSearch() {
    const city = cityInput.value.trim();
    if (!city) {
        showError('Enter a city name');
        return;
    }

    clearError();
    showLoading();

    try {
        const wRes = await fetch(`${API_BASE}/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
        if (!wRes.ok) {
            const errText = await wRes.text().catch(()=>null);
            throw new Error('City not found');
        }
        const wData = await wRes.json();

        const aRes = await fetch(`${API_BASE}/air_pollution?lat=${wData.coord.lat}&lon=${wData.coord.lon}&appid=${API_KEY}`);
        if (!aRes.ok) throw new Error('AQI unavailable');
        const aData = await aRes.json();

        displayWeather(wData);
        displayAQI(aData);

        cityInput.value = '';
        hideLoading();
    } catch (err) {
        hideLoading();
        showError(err.message || 'An error occurred');
    }
}

function displayWeather(d) {
    weatherCard.style.display = 'block';
    cityName.textContent = `${d.name}, ${d.sys.country}`;

    // Correct timezone handling: use the API-provided timestamp (d.dt) and timezone offset (seconds)
    // Create a Date for the local time by adding timezone offset to the UTC timestamp
    const localTime = new Date((d.dt + (d.timezone || 0)) * 1000);
    // Show a readable local time string (UTC string without GMT)
    dateTime.textContent = localTime.toUTCString().replace('GMT', '');

    weatherIcon.textContent = weatherIcons[d.weather[0].icon] || '🌤️';
    temperature.textContent = `${Math.round(d.main.temp)}°C`;
    weatherDesc.textContent = d.weather[0].description;
    humidity.textContent = d.main.humidity + '%';
    windSpeed.textContent = d.wind.speed + ' m/s';
    feelsLike.textContent = Math.round(d.main.feels_like) + '°C';
    pressure.textContent = d.main.pressure + ' hPa';
}

function displayAQI(d) {
    if (!d || !Array.isArray(d.list) || d.list.length === 0) {
        aqiCard.style.display = 'none';
        return;
    }
    const a = d.list[0];
    const info = aqiInfo[a.main.aqi] || aqiInfo[1];

    aqiCard.style.display = 'block';
    aqiValue.textContent = `${a.main.aqi} - ${info.label}`;
    aqiValue.className = `aqi-value ${info.class}`;
    aqiDesc.textContent = info.desc;

    // Some components may be undefined; guard and format
    const co = a.components.co != null ? a.components.co.toFixed(1) : 'N/A';
    const no2 = a.components.no2 != null ? a.components.no2.toFixed(1) : 'N/A';
    const o3 = a.components.o3 != null ? a.components.o3.toFixed(1) : 'N/A';
    const pm25 = a.components.pm2_5 != null ? a.components.pm2_5.toFixed(1) : 'N/A';
    const pm10 = a.components.pm10 != null ? a.components.pm10.toFixed(1) : 'N/A';
    const so2 = a.components.so2 != null ? a.components.so2.toFixed(1) : 'N/A';

    pollutantsGrid.innerHTML = `
        <div class="pollutant-box">CO<br>${co}</div>
        <div class="pollutant-box">NO₂<br>${no2}</div>
        <div class="pollutant-box">O₃<br>${o3}</div>
        <div class="pollutant-box">PM2.5<br>${pm25}</div>
        <div class="pollutant-box">PM10<br>${pm10}</div>
        <div class="pollutant-box">SO₂<br>${so2}</div>
    `;
}
</script>
</body>
</html>
